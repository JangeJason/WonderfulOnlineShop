server:
  port: 8080

spring:
  application:
    name: wonderful-online-shop-backend
  datasource:
    url: jdbc:h2:mem:wonderful;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

springdoc:
  swagger-ui:
    path: /swagger-ui.html

sa-token:
  token-name: Authorization
  token-style: uuid
  is-log: true
  timeout: 2592000
