server:
  port: 8080

spring:
  application:
    name: wonderful-online-shop-backend
  datasource:
    url: jdbc:mysql://localhost:3306/wonderful?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Wujiang520

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: []

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

sa-token:
  token-name: Authorization
  token-style: uuid
  is-log: true
  timeout: 2592000

app:
  upload-dir: uploads
  upload-cleanup:
    enabled: true
    # 每天凌晨 03:30 清理一次无引用文件
    cron: "0 30 3 * * ?"
    # 仅删除最后修改时间超过 N 小时且数据库无引用的文件
    delete-older-than-hours: 48
    # true 时只输出日志，不实际删除
    dry-run: false
  operation-log-cleanup:
    enabled: true
    # 每天凌晨 03:45 清理一次操作日志
    cron: "0 45 3 * * ?"
    # 操作日志保留天数
    retain-days: 180
    # true 时只打印清理信息，不实际删除
    dry-run: false

